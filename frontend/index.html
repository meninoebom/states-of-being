<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Blender</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>SONG BLENDER</h1>
    <div id="status">Select a song to begin</div>
  </header>

  <div id="controls">
    <button id="play-btn" disabled>Start</button>

    <!-- User-facing experience choice (guided flow) -->
    <div id="mode-toggle">
      <button data-mode="arc" class="active">Journey</button>
      <button data-mode="webcam">Free Play</button>
    </div>

    <!-- Raw developer mode dropdown (only shown with ?debug=1) -->
    <select id="mode-select" style="display:none">
      <option value="manual">Manual</option>
      <option value="webcam">Webcam</option>
      <option value="arc">Arc</option>
    </select>
  </div>

  <!-- Camera denial state: clear message + retry (guided flow needs the camera) -->
  <div id="camera-error" style="display:none">
    <p>The movement experience needs your camera. Please allow access, then try again.</p>
    <button id="camera-retry">Retry camera</button>
  </div>

  <!-- Hidden video element for webcam -->
  <video id="webcam-video" style="display:none" playsinline></video>

  <main>
    <div id="song-picker"></div>
    <div id="loop-grid"></div>
  </main>

  <!-- Phase indicator for arc mode -->
  <div id="phase-indicator" style="display:none"></div>

  <!-- Skeleton overlay for body tracking verification -->
  <canvas id="skeleton-canvas" style="display:none"></canvas>

  <!-- Debug overlay for movement qualities + readings -->
  <pre id="debug-panel" style="display:none"></pre>

  <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
